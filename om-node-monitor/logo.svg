<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#1a3a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#00d4aa" stroke-width="1.5" opacity="0.9"/>

  <!-- Server rack body -->
  <rect x="28" y="22" width="64" height="52" rx="4" fill="#0a1628" stroke="#00d4aa" stroke-width="1"/>

  <!-- Server unit 1 -->
  <rect x="33" y="27" width="54" height="11" rx="2" fill="#112240" stroke="#00d4aa" stroke-width="0.7"/>
  <circle cx="79" cy="32" r="2" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="73" cy="32" r="2" fill="#00d4aa" opacity="0.5"/>
  <rect x="36" y="30" width="28" height="5" rx="1" fill="#1e3a5f"/>

  <!-- Server unit 2 -->
  <rect x="33" y="41" width="54" height="11" rx="2" fill="#112240" stroke="#00d4aa" stroke-width="0.7"/>
  <circle cx="79" cy="46" r="2" fill="#00ff88" filter="url(#glow)"/>
  <circle cx="73" cy="46" r="2" fill="#ffd700" opacity="0.7"/>
  <rect x="36" y="44" width="22" height="5" rx="1" fill="#1e3a5f"/>

  <!-- Server unit 3 -->
  <rect x="33" y="55" width="54" height="11" rx="2" fill="#112240" stroke="#00d4aa" stroke-width="0.7"/>
  <circle cx="79" cy="60" r="2" fill="#00d4aa" opacity="0.5"/>
  <circle cx="73" cy="60" r="2" fill="#00d4aa" opacity="0.3"/>
  <rect x="36" y="58" width="32" height="5" rx="1" fill="#1e3a5f"/>

  <!-- ECG / heartbeat monitor line -->
  <polyline
    points="18,93 30,93 36,80 41,103 46,87 51,93 69,93 75,78 80,93 90,93 96,83 102,93"
    fill="none" stroke="url(#accent)" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Baseline -->
  <line x1="18" y1="93" x2="102" y2="93" stroke="#00d4aa" stroke-width="0.4" opacity="0.3"/>

  <!-- Label -->
  <text x="60" y="114" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="7.5"
        fill="#00d4aa" letter-spacing="1" opacity="0.85">NODE MONITOR</text>
</svg>
